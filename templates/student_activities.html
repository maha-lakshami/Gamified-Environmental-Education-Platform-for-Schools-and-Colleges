<!DOCTYPE html>

<html>
<head>
    <title>Student Activities</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>📘 Student Activities</h2>

{% for a in activities %}

<div style="background:white; padding:20px; margin:15px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">

```
<h3>{{ a.title }}</h3>
<p>{{ a.description }}</p>

<p>🎯 Points: {{ a.points }}</p>
<p>📅 {{ a.start_date }} → {{ a.end_date }}</p>

<a href="/activity/{{ a.id }}">View Activity</a>
```

</div>
{% endfor %}

</body>
</html>

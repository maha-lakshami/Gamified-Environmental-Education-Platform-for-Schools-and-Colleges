{% extends "base.html" %}
{% block content %}

<style>

body {
    background: #f4f6f9;
}

/* CENTER BOX */
.start-box {
    height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.start-card {
    background: white;
    padding: 50px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0px 6px 20px rgba(0,0,0,0.1);
    width: 400px;
}

/* TITLE */
.start-title {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 15px;
}

/* MESSAGE */
.start-msg {
    color: #555;
    margin-bottom: 30px;
    font-size: 16px;
}

/* BUTTON */
.start-btn {
    background: #007bff;
    color: white;
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.start-btn:hover {
    background: #0056b3;
}

/* ALL THE BEST */
.best-msg {
    margin-top: 25px;
    font-size: 18px;
    font-weight: bold;
    color: green;
}

</style>

<div class="start-box">

    <div class="start-card">

        <div class="start-title">
            🎮 EcoPlay Quiz
        </div>

        <div class="start-msg">
            Test your environmental knowledge and improve your eco-awareness.
        </div>

        <a href="/play_quiz/0">
            <button class="start-btn">
                🎮 Start Quiz
            </button>
        </a>

        <div class="best-msg">
            ⭐ All the Best! Give your best and learn something new!
        </div>

    </div>

</div>

{% endblock %}
